<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6467f2",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101122",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
<title>Register | AI Project Builder</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Navigation -->
<header class="flex items-center justify-between border-b border-slate-200 dark:border-primary/20 px-6 py-4 lg:px-20">
<div class="flex items-center gap-3">
<div class="size-8 bg-primary flex items-center justify-center rounded-lg text-white">
<span class="material-symbols-outlined text-xl">auto_awesome</span>
</div>
<h2 class="text-xl font-bold leading-tight tracking-tight">AI Project Builder</h2>
</div>
<div class="hidden md:flex items-center gap-6">
<a class="text-sm font-medium hover:text-primary transition-colors" href="#">Documentation</a>
<a class="text-sm font-medium hover:text-primary transition-colors" href="#">Pricing</a>
</div>
</header>
<!-- Main Content Container -->
<main class="flex flex-1 items-center justify-center py-12 px-6">
<div class="w-full max-w-[480px] flex flex-col gap-8">
<!-- Header Text -->
<div class="flex flex-col gap-3">
<h1 class="text-4xl font-bold leading-tight tracking-tight lg:text-5xl">Create account</h1>
<p class="text-slate-600 dark:text-slate-400 text-lg">Start building your next AI project in minutes.</p>
</div>
<!-- Registration Form -->
<form class="flex flex-col gap-5" onsubmit="return false;">
<!-- Full Name -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Full Name</label>
<input class="w-full rounded-lg border-none bg-slate-200/50 dark:bg-primary/10 p-4 text-base focus:ring-2 focus:ring-primary placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="John Doe" type="text"/>
</div>
<!-- Email -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Email Address</label>
<input class="w-full rounded-lg border-none bg-slate-200/50 dark:bg-primary/10 p-4 text-base focus:ring-2 focus:ring-primary placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="name@company.com" type="email"/>
</div>
<!-- Password -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Password</label>
<div class="relative flex items-center">
<input class="w-full rounded-lg border-none bg-slate-200/50 dark:bg-primary/10 p-4 pr-12 text-base focus:ring-2 focus:ring-primary placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="Create a strong password" type="password"/>
<button class="absolute right-4 text-slate-400 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Confirm Password</label>
<div class="relative flex items-center">
<input class="w-full rounded-lg border-none bg-slate-200/50 dark:bg-primary/10 p-4 pr-12 text-base focus:ring-2 focus:ring-primary placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="Repeat your password" type="password"/>
<button class="absolute right-4 text-slate-400 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="mt-4 w-full rounded-lg bg-primary px-8 py-4 text-lg font-bold text-white transition-opacity hover:opacity-90 active:scale-[0.98]" type="submit">
                            Create Account
                        </button>
</form>
<!-- Footer Links -->
<div class="flex flex-col items-center gap-6">
<div class="flex items-center gap-4 w-full">
<div class="h-[1px] flex-1 bg-slate-200 dark:bg-primary/20"></div>
<span class="text-xs uppercase tracking-widest text-slate-400">Or continue with</span>
<div class="h-[1px] flex-1 bg-slate-200 dark:bg-primary/20"></div>
</div>
<div class="grid grid-cols-2 gap-4 w-full">
<button class="flex items-center justify-center gap-2 rounded-lg border border-slate-200 dark:border-primary/20 py-3 hover:bg-slate-100 dark:hover:bg-primary/5 transition-colors">
<img alt="Google" class="size-5" data-alt="Google logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBcU3owhwe66KRXB-tDb8fezwyC2hIOX6KIA3mU72NkbuZ0WgGIkBr9j5NRhrUwqJIAtxJX7NlzgbDwp_4-EtbYckHUMz1y6BVqMqu1CNjN6GP8A68OGKhc4PGXS1eMYCXEqV9VBt6s0CCC2R2U8D58nWpJ6E3RFbW1XANCK3l-T1snaFBkYmREXYs7jRPa2Lh3RvmAvz1plrAMyLB9c0QC3JbUfaRs_LXmcNkuWU5IXULzu28s0n5qK6v6k3dLyGhUS8J86P-EUVM"/>
<span class="text-sm font-medium">Google</span>
</button>
<button class="flex items-center justify-center gap-2 rounded-lg border border-slate-200 dark:border-primary/20 py-3 hover:bg-slate-100 dark:hover:bg-primary/5 transition-colors">
<span class="material-symbols-outlined text-xl">terminal</span>
<span class="text-sm font-medium">GitHub</span>
</button>
</div>
<p class="text-slate-600 dark:text-slate-400 text-base">
                            Already have an account? 
                            <a class="font-bold text-primary hover:underline" href="#">Log in</a>
</p>
</div>
<!-- Terms -->
<p class="text-center text-xs text-slate-400 dark:text-slate-500 leading-relaxed">
                        By creating an account, you agree to our 
                        <a class="underline" href="#">Terms of Service</a> and 
                        <a class="underline" href="#">Privacy Policy</a>.
                    </p>
</div>
</main>
<!-- Bottom decorative element -->
<footer class="p-8 flex justify-center opacity-30">
<div class="flex gap-4">
<span class="material-symbols-outlined text-primary">deployed_code</span>
<span class="material-symbols-outlined text-primary">memory</span>
<span class="material-symbols-outlined text-primary">data_object</span>
</div>
</footer>
</div>
</div>
</body></html>
