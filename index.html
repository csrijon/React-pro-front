<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign In - AI Project Builder</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6467f2",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101122",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },

<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<header class="w-full flex items-center justify-between border-b border-slate-200 dark:border-slate-800 px-6 py-4">
<div class="flex items-center gap-3">
<div class="bg-primary p-2 rounded">
<span class="material-symbols-outlined text-white text-xl block">deployed_code</span>
</div>
<h1 class="text-xl font-bold tracking-tight">AI Project Builder</h1>
</div>
<nav>
<a class="text-sm font-medium hover:text-primary transition-colors" href="#">Documentation</a>
</nav>
</header>
<main class="flex-1 flex items-center justify-center p-6">
<div class="w-full max-w-md bg-white dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 p-8 rounded-xl shadow-2xl">
<div class="flex flex-col gap-2 mb-8">
<h2 class="text-3xl font-black tracking-tight">Sign In</h2>
<p class="text-slate-500 dark:text-slate-400">Welcome back! Please enter your details.</p>
</div>
<form action="#" class="space-y-6">
<div class="space-y-2">
<label class="text-sm font-medium block" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg">mail</span>
<input class="w-full pl-12 pr-4 py-3 rounded border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" id="email" name="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex items-center justify-between">
<label class="text-sm font-medium block" for="password">Password</label>
<a class="text-xs text-primary font-semibold hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg">lock</span>
<input class="w-full pl-12 pr-4 py-3 rounded border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center gap-2">
<input class="rounded border-slate-300 dark:border-slate-700 text-primary focus:ring-primary bg-transparent" id="remember" type="checkbox"/>
<label class="text-sm text-slate-500 dark:text-slate-400" for="remember">Remember for 30 days</label>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3 px-4 rounded transition-all flex items-center justify-center gap-2" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-lg">login</span>
</button>
<div class="relative py-4">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-800"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-white dark:bg-[#101122] px-2 text-slate-500">Or continue with</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-2 px-4 border border-slate-200 dark:border-slate-700 rounded hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors" type="button">
<img alt="Google Logo" class="w-4 h-4" data-alt="Google colorful G logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBcXsy-a9oB1Ht6d2YmiIGp7Vg3wGQuuHWSD8clElupMiEvv99wH2OOAL_UIn4b_b0s63VnC5CbAQeyz1ykSkM_UnWXA5vNdoHHnIMejrP-Dvl475UE7Qyx02Qj5cRUYAJrCWNVrEIr_6sHPXDYm0mvzJozzig62JygQ85h5sgWsTya-k2E2hGLYUWVkyMx94vuwtJnEZSU4vy6XWpJgAFBsQuxLG4KhibYqaftgRkt3weJguMf_rNIh9RMF2DTTtGitxwuft4sggY"/>
<span class="text-sm font-medium">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-2 px-4 border border-slate-200 dark:border-slate-700 rounded hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors" type="button">
<img alt="Github Logo" class="w-4 h-4 dark:invert" data-alt="Github octocat black logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC0PFRWexclUgBBKxk6o5cxpzqvQE4oK3TRgtoCk6lgthSjegbx2zXaryjsIyipd8QSXi5-SRLo7HFs5XfYrWOcyAOwwIzGddemG0bfgJ4hfhUhR5vPz9D8ip6vlyRf5Bw2jr3vRrftyf7XSlmmsvosnVswHZQhZ09p1LI6QmCZRXlUgkBf415F5dT1vcZ6fhD1smrlkjjdvTax3I8BMFBCsxNSXTTPRh8gK8zkwychzK2px949a9RpYmy59fyYtXtTNTBTIifu_i8"/>
<span class="text-sm font-medium">GitHub</span>
</button>
</div>
</form>
<div class="mt-8 text-center">
<p class="text-sm text-slate-500 dark:text-slate-400">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Create an account</a>
</p>
</div>
</div>
</main>
<footer class="p-6 text-center text-slate-500 dark:text-slate-500 text-xs">
<p>© 2024 AI Project Builder. All rights reserved. <a class="hover:text-primary mx-2" href="#">Privacy Policy</a> <a class="hover:text-primary mx-2" href="#">Terms of Service</a></p>
</footer>
</body></html>
